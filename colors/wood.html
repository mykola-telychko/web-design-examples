<!DOCTYPE html>
<html>
<head>
    <title>Дерев'яні відтінки</title>
    <style>
        .color-palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 800px;
            margin: 20px auto;
        }
        .color-box {
            width: 100%;
            height: 100px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
            color: white;
            text-shadow: 0 0 3px #000;
            font-family: Arial, sans-serif;
            font-size: 12px;
        }
        h1 {
            text-align: center;
            font-family: Arial, sans-serif;
            color: #5C4033;
        }
    </style>
</head>
<body>
    <h1>20 відтінків дерева</h1>
    <div class="color-palette">
        <div class="color-box" style="background-color: #D2B48C;">#D2B48C</div>
        <div class="color-box" style="background-color: #E5C298;">#E5C298</div>
        <div class="color-box" style="background-color: #C19A6B;">#C19A6B</div>
        <div class="color-box" style="background-color: #D1A179;">#D1A179</div>
        <div class="color-box" style="background-color: #B88A3D;">#B88A3D</div>
        <div class="color-box" style="background-color: #A78B65;">#A78B65</div>
        <div class="color-box" style="background-color: #6F4E37;">#6F4E37</div>
        <div class="color-box" style="background-color: #C04000;">#C04000</div>
        <div class="color-box" style="background-color: #5C4033;">#5C4033</div>
        <div class="color-box" style="background-color: #A52A2A;">#A52A2A</div>
        <div class="color-box" style="background-color: #B1946F;">#B1946F</div>
        <div class="color-box" style="background-color: #6B4423;">#6B4423</div>
        <div class="color-box" style="background-color: #6D4C3D;">#6D4C3D</div>
        <div class="color-box" style="background-color: #8B5A2B;">#8B5A2B</div>
        <div class="color-box" style="background-color: #926F44;">#926F44</div>
        <div class="color-box" style="background-color: #57412B;">#57412B</div>
        <div class="color-box" style="background-color: #3D2B1F;">#3D2B1F</div>
        <div class="color-box" style="background-color: #C8AC9D;">#C8AC9D</div>
        <div class="color-box" style="background-color: #8B7355;">#8B7355</div>
        <div class="color-box" style="background-color: #7E5835;">#7E5835</div>
    </div>
</body>
</html>
