<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сталева проволока</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #DBDED3;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            gap: 40px;
        }

        .example-label {
            font-size: 1.5rem;
            color: #555;
            font-weight: bold;
            text-align: center;
            margin-bottom: -20px;
        }

        :root {
            --pole-width-thin: 10px;
            --pole-width-thick: 20px;
        }

        .steel-wire {
            width: 500px;
            height: var(--pole-width-thin);
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .steel-wire.thin {
            background: 
                linear-gradient(
                    90deg, 
                    #FFFFFF 0%, 
                    #7C7C7C 10%, 
                    #B0B0B0 50%, 
                    #7C7C7C 90%, 
                    #FFFFFF 100%
                );
            box-shadow: 
                inset 0 calc(-1 * var(--pole-width-thin) / 7) #7C7C7C, 
                inset 0 calc(-1 * var(--pole-width-thin) / 5) #FFFFFF,
                0px 5px 15px rgba(0, 0, 0, 0.2);
        }

        .steel-wire.thick {
            width: 600px;
            height: var(--pole-width-thick);
            background: 
                linear-gradient(
                    90deg, 
                    #E0E0E0 0%, 
                    #6B6B6B 15%, 
                    #9E9E9E 50%, 
                    #6B6B6B 85%, 
                    #E0E0E0 100%
                );
            box-shadow: 
                inset 0 calc(-1 * var(--pole-width-thick) / 7) #6B6B6B, 
                inset 0 calc(-1 * var(--pole-width-thick) / 5) #FFFFFF,
                0px 8px 20px rgba(0, 0, 0, 0.3);
        }

        .steel-wire.rusty {
            background: 
                linear-gradient(
                    90deg, 
                    #C48C6B 0%, 
                    #A65E42 20%, 
                    #8C4F35 50%, 
                    #A65E42 80%, 
                    #C48C6B 100%
                );
            box-shadow: 
                inset 0 calc(-1 * var(--pole-width-thin) / 7) #8C4F35, 
                inset 0 calc(-1 * var(--pole-width-thin) / 5) #F1C3A7,
                0px 5px 15px rgba(0, 0, 0, 0.2);
        }

        .steel-wire.vertical-shine {
            /* Vertical gradient from top to bottom */
            background: 
                linear-gradient(
                    180deg, 
                    #FFFFFF 0%, 
                    #7C7C7C 10%, 
                    #B0B0B0 50%, 
                    #7C7C7C 90%, 
                    #FFFFFF 100%
                );
            /* Box-shadow adjusted for vertical light source */
            box-shadow: 
                inset calc(-1 * var(--pole-width-thin) / 7) 0 #7C7C7C, 
                inset calc(-1 * var(--pole-width-thin) / 5) 0 #FFFFFF,
                0px 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="example-label">Тонка і блискуча проволока</div>
    <div class="steel-wire thin"></div>

    <div class="example-label">Товста і міцна проволока</div>
    <div class="steel-wire thick"></div>
    
    <div class="example-label">Стара і іржава проволока</div>
    <div class="steel-wire rusty"></div>
    
    <div class="example-label">Проволока з вертикальним висвітленням</div>
    <div class="steel-wire vertical-shine"></div>
</body>
</html>
