<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elipses</title>
    <style>
.ellipse {
    border: 1px solid black;
    margin: 10px;
}

/* 1. Класичний горизонтальний еліпс */
.ellipse1 {
    width: 200px;
    height: 100px;
    border-radius: 100px / 50px;
}

/* 2. Класичний вертикальний еліпс */
.ellipse2 {
    width: 100px;
    height: 200px;
    border-radius: 50px / 100px;
}

/* 3. Ідеальне коло */
.ellipse3 {
    width: 100px;
    height: 100px;
    border-radius: 50%;
}

/* 4. Довгий горизонтальний */
.ellipse4 {
    width: 300px;
    height: 80px;
    border-radius: 150px / 40px;
}

/* 5. Довгий вертикальний */
.ellipse5 {
    width: 80px;
    height: 300px;
    border-radius: 40px / 150px;
}

/* 6. Еліпс з маленькою висотою */
.ellipse6 {
    width: 250px;
    height: 40px;
    border-radius: 125px / 20px;
}

/* 7. Еліпс з великою висотою */
.ellipse7 {
    width: 60px;
    height: 200px;
    border-radius: 30px / 100px;
}

/* 8. Еліпс як яйце */
.ellipse8 {
    width: 120px;
    height: 180px;
    border-radius: 60px / 90px;
}

/* 9. Широке коло */
.ellipse9 {
    width: 180px;
    height: 180px;
    border-radius: 90px;
}

/* 10. Вузьке овальне обличчя */
.ellipse10 {
    width: 90px;
    height: 160px;
    border-radius: 45px / 80px;
}

/* 11. Рівносторонній еліпс */
.ellipse11 {
    width: 150px;
    height: 150px;
    border-radius: 50%;
}

/* 12. Дитяче коло */
.ellipse12 {
    width: 60px;
    height: 60px;
    border-radius: 50%;
}

/* 13. Квадрат з еліптичними кутами */
.ellipse13 {
    width: 120px;
    height: 120px;
    border-radius: 30%;
}

/* 14. Злегка овальний */
.ellipse14 {
    width: 130px;
    height: 100px;
    border-radius: 65px / 50px;
}

/* 15. Дуже витягнутий горизонтально */
.ellipse15 {
    width: 400px;
    height: 100px;
    border-radius: 200px / 50px;
}

    </style>
</head>
<body>

    <div class="ellipse ellipse1"></div>
    <div class="ellipse ellipse2"></div>
    <div class="ellipse ellipse3"></div>
    <div class="ellipse ellipse4"></div>
    <div class="ellipse ellipse5"></div>
    <div class="ellipse ellipse6"></div>
    <div class="ellipse ellipse7"></div>
    <div class="ellipse ellipse8"></div>
    <div class="ellipse ellipse9"></div>
    <div class="ellipse ellipse10"></div>
    <div class="ellipse ellipse11"></div>
    <div class="ellipse ellipse12"></div>
    <div class="ellipse ellipse13"></div>
    <div class="ellipse ellipse14"></div>
    <div class="ellipse ellipse15"></div>


</body>
</html>
